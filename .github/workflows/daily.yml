name: Bond AI OS V3 Auto

on:
  schedule:
    - cron: '0 1 * * *'  # every day 01:00 UTC
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bond AI OS
        run: |
          python main.py

      - name: Done
        run: echo "Bond AI OS completed"